server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  location /api/ { proxy_pass http://backend:8000/api/; }
  location /disc-api/ { proxy_pass http://backend:8000/disc/; }
  location /storage/ { proxy_pass http://backend:8000/storage/; }
  location = /app.js {
    add_header Cache-Control "no-store, max-age=0";
    try_files /app.js =404;
  }
  location = /styles.css {
    add_header Cache-Control "no-store, max-age=0";
    try_files /styles.css =404;
  }
  location / {
    add_header Cache-Control "no-store, max-age=0";
    try_files $uri /index.html;
  }
}
