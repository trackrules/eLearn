services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: elearn
      POSTGRES_USER: elearn
      POSTGRES_PASSWORD: elearn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elearn -d elearn"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: dev_master_key
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://elearn:elearn@postgres:5432/elearn
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: dev_master_key
      IMAGE_STORAGE_DIR: /app/storage/images
      PUBLIC_IMAGE_PATH: /storage/images
      CRAWL_RATE_SECONDS: "1.0"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - crawler_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started

  frontend:
    image: nginx:1.27-alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  meili_data:
  crawler_storage:
